<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Kezia Kenova</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0d0a08;
    font-family: "Inter", -apple-system, sans-serif;
    color: #e8dfd2;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }

  .page {
    position: relative;
    min-height: 100vh;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, #2a1a12 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 100%, #1a0e08 0%, transparent 60%),
      linear-gradient(180deg, #0d0a08 0%, #0a0706 100%);
    overflow: hidden;
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.06;
    z-index: 1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='1'/></svg>");
  }

  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
  }

  .shell {
    position: relative;
    z-index: 2;
    max-width: 460px;
    margin: 0 auto;
    padding: 56px 28px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hero {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-bottom: 36px;
    animation: fadeUp 1.1s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }

  .frame {
    position: relative;
    width: 100%;
    aspect-ratio: 359 / 540;
    max-width: 380px;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(232, 223, 210, 0.08);
  }

  .frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: contrast(1.02) saturate(1.05);
  }

  .frame-glow {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(13,10,8,0.5) 100%);
    pointer-events: none;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeUp 1.1s 0.15s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(232, 223, 210, 0.55);
    margin-bottom: 16px;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #d4a574;
    box-shadow: 0 0 8px rgba(212, 165, 116, 0.6);
    animation: pulse 2.4s ease-in-out infinite;
  }

  .name {
    font-family: "Cormorant Garamond", serif;
    font-weight: 400;
    font-size: clamp(40px, 9vw, 56px);
    letter-spacing: 0.01em;
    line-height: 1;
    color: #f4ead9;
    margin-bottom: 14px;
  }

  .tagline {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 15px;
    letter-spacing: 0.18em;
    color: rgba(232, 223, 210, 0.6);
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link {
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    background: rgba(232, 223, 210, 0.03);
    border: 1px solid rgba(232, 223, 210, 0.1);
    border-radius: 2px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    overflow: hidden;
  }

  .link:nth-child(1) { animation-delay: 0.4s; }
  .link:nth-child(2) { animation-delay: 0.48s; }
  .link:nth-child(3) { animation-delay: 0.56s; }

  .link::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(212, 165, 116, 0.08) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    pointer-events: none;
  }

  .link:hover {
    background: rgba(232, 223, 210, 0.06);
    border-color: rgba(212, 165, 116, 0.35);
    transform: translateY(-2px);
  }

  .link:hover::before { transform: translateX(100%); }

  .link-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #d4a574;
    flex-shrink: 0;
  }

  .link-icon svg { width: 22px; height: 22px; }

  .link-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .link-label {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: #f4ead9;
  }

  .link-handle {
    font-size: 12px;
    font-weight: 300;
    color: rgba(232, 223, 210, 0.5);
    letter-spacing: 0.04em;
  }

  .link-arrow {
    display: flex;
    align-items: center;
    color: rgba(232, 223, 210, 0.35);
    transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .link-arrow svg { width: 16px; height: 16px; }

  .link:hover .link-arrow {
    color: #d4a574;
    transform: translate(2px, -2px);
  }

  .footer {
    margin-top: 48px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    animation: fadeUp 1s 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }

  .rule {
    width: 32px;
    height: 1px;
    background: rgba(212, 165, 116, 0.4);
  }

  .footer p {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(232, 223, 210, 0.35);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  @media (max-width: 420px) {
    .shell { padding: 40px 20px 36px; }
    .hero { margin-bottom: 28px; }
    .header { margin-bottom: 32px; }
  }
</style>
</head>
<body>
  <main class="page">
    <div class="grain"></div>
    <div class="vignette"></div>

    <div class="shell">
      <div class="hero">
        <div class="frame">
          <img src="kezia.jpeg" alt="Kezia Kenova" />
          <div class="frame-glow"></div>
        </div>
      </div>

      <header class="header">
        <div class="eyebrow">
          <span class="dot"></span>
          <span>Bali · Indonesia</span>
        </div>
        <h1 class="name">Kezia Kenova</h1>
        <p class="tagline">model · creator · storyteller</p>
      </header>

      <nav class="links">
        <a href="https://instagram.com/" target="_blank" rel="noopener noreferrer" class="link">
          <span class="link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="5" />
              <circle cx="12" cy="12" r="4" />
              <circle cx="17.5" cy="6.5" r="0.6" fill="currentColor" />
            </svg>
          </span>
          <span class="link-text">
            <span class="link-label">Instagram</span>
            <span class="link-handle">@keziakenova</span>
          </span>
          <span class="link-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 17L17 7M17 7H8M17 7v9" />
            </svg>
          </span>
        </a>

        <a href="https://tiktok.com/" target="_blank" rel="noopener noreferrer" class="link">
          <span class="link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5" />
            </svg>
          </span>
          <span class="link-text">
            <span class="link-label">TikTok</span>
            <span class="link-handle">@keziakenova</span>
          </span>
          <span class="link-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 17L17 7M17 7H8M17 7v9" />
            </svg>
          </span>
        </a>

        <a href="https://youtube.com/" target="_blank" rel="noopener noreferrer" class="link">
          <span class="link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="5" width="20" height="14" rx="3" />
              <path d="M10 9l5 3-5 3V9z" fill="currentColor" stroke="none" />
            </svg>
          </span>
          <span class="link-text">
            <span class="link-label">YouTube</span>
            <span class="link-handle">Subscribe</span>
          </span>
          <span class="link-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 17L17 7M17 7H8M17 7v9" />
            </svg>
          </span>
        </a>
      </nav>

      <footer class="footer">
        <div class="rule"></div>
        <p>© <span id="year"></span> Kezia Kenova</p>
      </footer>
    </div>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
